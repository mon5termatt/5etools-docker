<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5etools — Loading</title>
  <style>
    :root {
      --bg: #12141a;
      --fg: #e8eaef;
      --muted: #8b93a7;
      --accent: #3d9cf0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: radial-gradient(ellipse at top, #1a1f2b 0%, var(--bg) 55%);
      color: var(--fg);
    }
    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0;
      color: var(--muted);
      max-width: 28rem;
      line-height: 1.5;
    }
    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      margin: 0 auto 1.5rem;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: var(--accent);
      min-height: 1.4em;
    }
    #detail {
      margin-top: 0.35rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <div class="spinner" aria-hidden="true"></div>
      <h1>5etools</h1>
      <p>Downloading and preparing files. The site will open automatically when ready.</p>
      <p id="status">Starting…</p>
      <p id="detail"></p>
    </div>
  </main>
  <script>
    const statusEl = document.getElementById("status");
    const detailEl = document.getElementById("detail");

    async function check() {
      try {
        const res = await fetch("/status.json?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("status " + res.status);
        const data = await res.json();
        statusEl.textContent = data.message || data.phase || "Working…";
        detailEl.textContent = data.detail || "";
        if (data.ready) {
          statusEl.textContent = "Ready — loading site…";
          window.location.replace("/");
          return;
        }
      } catch (err) {
        statusEl.textContent = "Waiting for server…";
        detailEl.textContent = String(err.message || err);
      }
      setTimeout(check, 2000);
    }
    check();
  </script>
</body>
</html>
